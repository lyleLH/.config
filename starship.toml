# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_macchiato"

format = """
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$line_break\
$character"""

right_format = '$time'

[fill]
symbol = ' '

[character]
success_symbol = "[❯](lavender)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

[git_branch]
format = "[$symbol$branch]($style) "
style = "bold mauve"
symbol = " "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold peach"

[cmd_duration]
min_time = 500
format = "[$duration]($style) "
style = "bold yellow"

[time]
disabled = false
format = '[$time]($style)'
style = 'bold overlay1'
time_format = '%H:%M'

# Disable cloud modules
[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

