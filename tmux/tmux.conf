# ── General ───────────────────────────────────────────
set -g default-command "${SHELL}"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 1
set -g allow-passthrough on
set -g display-panes-time 2000
set -g focus-events on
set-window-option -g mode-keys vi

# ── Prefix ────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# ── Splits ────────────────────────────────────────────
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# ── Resize ────────────────────────────────────────────
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# ── Copy mode (vi) ────────────────────────────────────
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "wl-copy"
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── Reload config ─────────────────────────────────────
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# ── Popups ────────────────────────────────────────────
bind T display-popup -E -w 90% -h 80% "SKIP_NEOFETCH=1 zsh -ic '_tx_help'"
bind g display-popup -E -h 75% -w 75% -d "#{pane_current_path}"
bind G display-popup -E -h 90% -w 90% -d "#{pane_current_path}" "lazygit"
bind e display-popup -E -h 90% -w 90% -d "#{pane_current_path}" "yazi"

# ── Nested tmux (SSH) — F12 toggle inner/outer ────────
bind -T root F12 \
  set prefix None \; set key-table off \; \
  set status-style "bg=colour238" \; refresh-client -S
bind -T off F12 \
  set -u prefix \; set -u key-table \; \
  set -u status-style \; refresh-client -S

# ── Plugins ───────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'tmux-plugins/tmux-cowboy'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'schasse/tmux-jump'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-logging'

# ── Catppuccin theme ──────────────────────────────────
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_text '#W'
set -g @catppuccin_status_modules_right 'session directory date_time'
set -g @catppuccin_date_time_text '%m/%d %H:%M'

# ── Plugin settings ───────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @thumbs-key Space
set -g @tmux-fzf-launch-key 'F'
set -g @jump-key 'j'
set -g @floax-bind 'p'
set -g @sessionx-bind 'o'
set -g @extrakto_key 'tab'
set -g @logging-path '$HOME/.tmux/logs'

# ── Initialize tpm (keep at bottom) ──────────────────
run '~/.config/tmux/plugins/tpm/tpm'
