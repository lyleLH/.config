# vim:fileencoding=utf-8:foldmethod=marker

# === Font ===
font_family      Maple Mono
font_size        16.0
# Nerd Font symbols (powerline, devicons, etc.)
symbol_map U+E000-U+E00A,U+EA60-U+EBEB,U+E0A0-U+E0C8,U+E0CA,U+E0CC-U+E0D7,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B5,U+E700-U+E7C5,U+ED00-U+EFCE,U+F000-U+F2FF,U+F300-U+F372,U+F400-U+F533,U+F0001-U+F1AF0 Symbols Nerd Font Mono
modify_font cell_width 96%
modify_font cell_height 106%
modify_font baseline -1
text_composition_strategy 1.5 40

# === Rendering ===
input_delay 3
repaint_delay 6
sync_to_monitor yes
touch_scroll_multiplier 1.0
wheel_scroll_multiplier 1.0
wheel_scroll_min_lines 1

# === Cursor ===
cursor_shape          beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

# === Scrollback ===
scrollback_lines 50000

# === Mouse ===
mouse_hide_while_typing yes
copy_on_select          clipboard
strip_trailing_spaces   smart
select_by_word_characters @-./_~?&=%+#
show_hyperlink_targets yes
mouse_map left click ungrabbed no-op
mouse_map cmd+left click ungrabbed,grabbed mouse_handle_click selection link prompt
mouse_map cmd+left press ungrabbed,grabbed mouse_selection normal
mouse_map right press ungrabbed copy_to_clipboard

# === Window ===
remember_window_size    yes
initial_window_width    160c
initial_window_height   48c
window_padding_width    8 10
window_border_width     0.5pt
confirm_os_window_close -1
macos_option_as_alt     yes
hide_window_decorations titlebar-only

# === Layout ===
enabled_layouts splits,stack
window_resize_step_cells 2
window_resize_step_lines 2
visual_window_select_characters 1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ

# === Tabs ===
tab_bar_edge          top
tab_bar_style         custom
tab_bar_align         left
tab_bar_min_tabs      1
tab_title_max_length  0
tab_powerline_style   round

# === Background ===
background_opacity         0.98
dynamic_background_opacity yes
macos_colorspace srgb

# === Shell & integration ===
shell_integration    enabled
term                 xterm-256color
allow_remote_control yes
listen_on unix:/tmp/kitty-socket
allow_hyperlinks     yes
paste_actions        quote-urls-at-prompt
remote_kitty         if-needed
share_connections    yes

# === Splits & navigation (Cmd keys, Ctrl+A reserved for tmux) ===
kitty_mod ctrl+shift
include splits.conf

# === Keybindings ===

# Prevent accidental creation
map kitty_mod+enter no-op
map cmd+enter       no-op

# Tabs (match Ghostty)
map cmd+t           new_tab_with_cwd
map cmd+shift+left  previous_tab
map cmd+shift+right next_tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Font size (match Ghostty)
map cmd+equal  change_font_size all +2.0
map cmd+minus  change_font_size all -2.0
map cmd+0      change_font_size all 0

# Fullscreen
map f11 toggle_fullscreen

# Config
map cmd+shift+comma launch --type=tab nvim ~/.config/kitty/kitty.conf
map cmd+shift+r combine : load_config_file : launch --type=overlay sh -c 'echo "kitty config reloaded."; read -r -p "Press Enter to exit"'

# Hints
map f3 kitten hints --program '*'

# Clear screen (match Ghostty)
map cmd+k clear_terminal to_cursor active

# === Startup ===
startup_session session.conf

# === Theme (auto dark/light via .auto.conf files) ===
# Set up by: kitty +kitten themes --config-file-name dark-theme.auto.conf
#            kitty +kitten themes --config-file-name light-theme.auto.conf
clipboard_control write-clipboard write-primary read-clipboard read-primary
