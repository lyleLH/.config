# Splits — Cmd keys only (Ctrl+A reserved for tmux)

# Create splits (same as Ghostty)
map cmd+d launch --location=vsplit --cwd=last_reported
map cmd+shift+d launch --location=hsplit --cwd=last_reported

# Navigate splits (same as Ghostty)
map cmd+opt+left neighboring_window left
map cmd+opt+right neighboring_window right
map cmd+opt+up neighboring_window up
map cmd+opt+down neighboring_window down

# Resize splits
map cmd+opt+shift+left resize_window narrower 3
map cmd+opt+shift+right resize_window wider 3
map cmd+opt+shift+up resize_window taller 3
map cmd+opt+shift+down resize_window shorter 3

# Equalize splits
map cmd+opt+equal resize_window reset

# Toggle zoom (stack layout)
map cmd+shift+z toggle_layout stack
